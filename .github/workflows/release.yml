name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check-go:
    name: Check Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: make build-go
      - run: make lint-go
      - run: make test-go

  check-ts:
    name: Check TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd ts && npm ci
      - run: make build-ts
      - run: make lint-ts
      - run: make test-ts

  check-python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make build-python
      - run: make lint-python
      - run: make test-python

  publish-npm:
    name: Publish to npm
    needs: [check-go, check-ts, check-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        run: |
          cd ts
          npm ci
          npm run build

      - name: Publish
        run: cd ts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [check-go, check-ts, check-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish
        run: |
          pip install build twine
          cd python
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  tag-go-module:
    name: Tag Go Module
    needs: [check-go, check-ts, check-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and create Go tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          go_tag="go/v${version}"
          # Check if the Go tag already exists
          if git rev-parse "$go_tag" >/dev/null 2>&1; then
            echo "Tag $go_tag already exists, skipping"
            exit 0
          fi
          git tag "$go_tag"
          git push origin "$go_tag"

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-pypi, tag-go-module]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
