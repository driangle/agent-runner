name: Publish Go Module

on:
  push:
    tags:
      - "go/v*"

jobs:
  check-go:
    name: Check Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: make build-go
      - run: make lint-go
      - run: make test-go

  check-ts:
    name: Check TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd ts && npm ci
      - run: make build-ts
      - run: make lint-ts
      - run: make test-ts

  check-python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make build-python
      - run: make lint-python
      - run: make test-python

  validate:
    name: Validate Go Module
    runs-on: ubuntu-latest
    needs: [check-go, check-ts, check-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#go/}" >> "$GITHUB_OUTPUT"

      - name: Verify module is fetchable
        run: GOPROXY=https://proxy.golang.org go list -m "github.com/driangle/agentrunner/go@${{ steps.version.outputs.version }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Go ${{ github.ref_name }}"
          generate_release_notes: true
