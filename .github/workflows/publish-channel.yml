name: Publish Channel Binary

on:
  push:
    tags:
      - "channel/v*"

jobs:
  check-go:
    name: Check Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: make build-go
      - run: make lint-go
      - run: make test-go

  check-ts:
    name: Check TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd ts && npm ci
      - run: make build-ts
      - run: make lint-ts
      - run: make test-ts

  check-python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make build-python
      - run: make lint-python
      - run: make test-python

  cross-compile:
    name: Cross-compile binaries
    needs: [check-go, check-ts, check-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cross-compile all platforms
        run: make cross-compile

      - uses: actions/upload-artifact@v4
        with:
          name: channel-binaries
          path: dist/

  publish-npm:
    name: Publish npm (${{ matrix.npm_pkg }})
    needs: cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm_pkg: channel-darwin-arm64
            npm_name: "@driangle/agentrunner-channel-darwin-arm64"
          - goos: darwin
            goarch: amd64
            npm_pkg: channel-darwin-x64
            npm_name: "@driangle/agentrunner-channel-darwin-x64"
          - goos: linux
            goarch: arm64
            npm_pkg: channel-linux-arm64
            npm_name: "@driangle/agentrunner-channel-linux-arm64"
          - goos: linux
            goarch: amd64
            npm_pkg: channel-linux-x64
            npm_name: "@driangle/agentrunner-channel-linux-x64"
          - goos: windows
            goarch: amd64
            npm_pkg: channel-win32-x64
            npm_name: "@driangle/agentrunner-channel-win32-x64"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: channel-binaries
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Place binary and publish
        run: |
          pkg_dir="npm/${{ matrix.npm_pkg }}"
          mkdir -p "$pkg_dir/bin"
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          src="dist/agentrunner-channel-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          dst="$pkg_dir/bin/agentrunner-channel${ext}"
          cp "$src" "$dst"
          chmod +x "$dst"
          cd "$pkg_dir"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI (${{ matrix.wheel_tag }})
    needs: cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            wheel_tag: macosx_11_0_arm64
          - goos: darwin
            goarch: amd64
            wheel_tag: macosx_10_12_x86_64
          - goos: linux
            goarch: arm64
            wheel_tag: manylinux_2_17_aarch64.manylinux2014_aarch64
          - goos: linux
            goarch: amd64
            wheel_tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - goos: windows
            goarch: amd64
            wheel_tag: win_amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: channel-binaries
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish wheel
        run: |
          pip install build twine
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          mkdir -p python/channel/src/agentrunner_channel/bin
          cp "dist/agentrunner-channel-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" \
             "python/channel/src/agentrunner_channel/bin/agentrunner-channel${ext}"
          chmod +x "python/channel/src/agentrunner_channel/bin/agentrunner-channel${ext}"
          cd python/channel
          python -m build --wheel
          # Rename wheel to platform-specific tag
          for whl in dist/*.whl; do
            new="$(echo "$whl" | sed "s/py3-none-any/py3-none-${{ matrix.wheel_tag }}/")"
            mv "$whl" "$new"
          done
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: cross-compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: channel-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Channel ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
